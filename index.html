<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NWE Resource Group | Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <nav class="navbar">
        <div class="nav-container">
            <a href="#home" class="main-logo fade-in-down">
                <img src="img/NWE Resource Group Berhad-01.png" alt="NWE Resource Group Logo">
            </a>
            
            <div class="menu-toggle" id="mobile-menu">
                <i class="fas fa-bars"></i>
            </div>

            <ul class="nav-menu fade-in-down" style="animation-delay: 0.1s;">
                <li><a href="#home">Home</a></li>
                <li><a href="#about">About Us</a></li>
                <li><a href="#industries">Industries</a></li>
                <li><a href="#career">Career</a></li>
                <li><a href="#contact">Contact</a></li>
            </ul>
        </div>
    </nav>

    <section id="home" class="hero">
        <div class="hero-overlay"></div>
        
        <div class="container hero-content">
            <div class="hero-logos">
                <a href="https://m-plan.com.my/" target="_blank" class="logo-link fade-in-up" style="animation-delay: 0.2s;">
                    <div class="card-inner">
                        <img src="img/MPLAN.png" alt="M-Plan Logo">
                    </div>
                    <div class="card-footer">
                        <span>Explore M-Plan</span>
                        <i class="fas fa-chevron-right"></i>
                    </div>
                </a>
                
                <a href="https://northwest.com.my/" target="_blank" class="logo-link fade-in-up" style="animation-delay: 0.3s;">
                    <div class="card-inner">
                        <img src="img/nw.jpeg" alt="North West Logo">
                    </div>
                    <div class="card-footer">
                        <span>Explore North West</span>
                        <i class="fas fa-chevron-right"></i>
                    </div>
                </a>
            </div>
        </div>
    </section>

    <footer id="contact" class="footer fade-in-up" style="animation-delay: 0.5s;">
        <div class="container footer-content">
            <div class="footer-contact">
                <h3>CONTACT INFORMATION</h3>
                <ul>
                    <li>
                        <div class="icon-box"><i class="fas fa-map-marker-alt"></i></div>
                        <span>5, Jalan Peguam U1/25, Hicom Glenmarie Industrial Park,<br>40150 Shah Alam, Selangor, Malaysia</span>
                    </li>
                    <li>
                        <div class="icon-box"><i class="fas fa-phone-alt"></i></div>
                        <span>+603-55685100</span>
                    </li>
                    <li>
                        <div class="icon-box"><i class="fas fa-envelope"></i></div>
                        <a href="mailto:corporate@nwegroup.com.my">corporate@nwegroup.com.my</a>
                    </li>
                </ul>
            </div>
        </div>
    </footer>

    <script src="script.js"></script>
</body>
</html>
