<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NWE Resource Group | Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <nav class="navbar">
        <div class="container-full navbar-center">
            <a href="#home" class="main-logo fade-in-down">
                <img src="img/NWE logo.jpeg" alt="NWE Resource Group Logo">
            </a>
        </div>
    </nav>

    <section id="home" class="hero">
        <div class="hero-overlay"></div>
        
        <div class="container hero-content">
            <h1 class="fade-in-up" style="animation-delay: 0.1s;">Under Construction</h1>
            
            <div class="hero-logos">
                <a href="https://m-plan.com.my/" target="_blank" class="logo-link fade-in-up" style="animation-delay: 0.3s;">
                    <div class="card-inner">
                        <img src="img/MPLAN.png" alt="M-Plan Logo">
                    </div>
                    <div class="card-footer">
                        <span>Explore M-Plan</span>
                        <i class="fas fa-arrow-right"></i>
                    </div>
                </a>
                
                <a href="https://northwest.com.my/" target="_blank" class="logo-link fade-in-up" style="animation-delay: 0.4s;">
                    <div class="card-inner">
                        <img src="img/nw.jpeg" alt="North West Logo">
                    </div>
                    <div class="card-footer">
                        <span>Explore North West</span>
                        <i class="fas fa-arrow-right"></i>
                    </div>
                </a>
            </div>
        </div>
    </section>

    <script src="script.js"></script>
</body>
</html>
